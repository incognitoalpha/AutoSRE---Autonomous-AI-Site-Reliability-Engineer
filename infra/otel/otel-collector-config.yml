receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  transform:
    rules:
      - context: resource
        statements:
          - replace_pattern(attributes["service.name"], "[-.]", "_")

exporters:
  kafka:
    brokers:
      - kafka:9092
    topic:
      # Maps OTEL signal type to appropriate Kafka topic
      pattern: 'telemetry-{signal}'

    encoding: otlp_json

    partitioner: by_topic

    producer:
      batch:
        linger: 10ms
        queue_size: 10000

  logging:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [kafka, logging]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [kafka, logging]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [kafka, logging]

  telemetry:
    logs:
      level: info