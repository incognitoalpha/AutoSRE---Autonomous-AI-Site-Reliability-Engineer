{{- /*
Template for Anomaly Detection Service Deployment
*/ -}}
{{- $svc := .Values.services.anomaly_detection -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autosre-anomaly-detection
  namespace: {{ .Release.Namespace }}
  labels:
    app: autosre
    component: anomaly-detection
    version: {{ .Chart.Version }}
spec:
  replicas: {{ $svc.replicaCount | default 2 }}
  selector:
    matchLabels:
      app: autosre
      component: anomaly-detection
  template:
    metadata:
      labels:
        app: autosre
        component: anomaly-detection
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $svc.port }}"
    spec:
      containers:
        - name: anomaly-detection
          image: "{{ .Values.global.image.repository }}/anomaly-detection:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http
          env:
            - name: AUTOSRE_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.config.autosre.kafka.bootstrap_servers }}
            - name: AUTOSRE_KAFKA_CONSUMER_GROUPS_ANOMALY_SERVICE
              value: "anomaly-consumer-group"
            - name: AUTOSRE_KAFKA_TOPICS_METRICS
              value: "autosre.telemetry.metrics"
          resources:
            requests:
              cpu: {{ $svc.resources.requests.cpu | default "100m" }}
              memory: {{ $svc.resources.requests.memory | default "256Mi" }}
            limits:
              cpu: {{ $svc.resources.limits.cpu | default "500m" }}
              memory: {{ $svc.resources.limits.memory | default "512Mi" }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: {{ .Values.global.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.global.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: {{ .Values.global.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.global.readinessProbe.periodSeconds }}
---
apiVersion: v1
kind: Service
metadata:
  name: autosre-anomaly-detection
  namespace: {{ .Release.Namespace }}
  labels:
    app: autosre
    component: anomaly-detection
spec:
  type: ClusterIP
  ports:
    - port: {{ $svc.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: autosre
    component: anomaly-detection