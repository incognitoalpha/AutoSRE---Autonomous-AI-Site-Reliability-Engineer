{{- /*
Template for API Gateway Service Deployment
*/ -}}
{{- $svc := .Values.services.api_gateway -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autosre-api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: autosre
    component: api-gateway
    version: {{ .Chart.Version }}
spec:
  replicas: {{ $svc.replicaCount | default 2 }}
  selector:
    matchLabels:
      app: autosre
      component: api-gateway
  template:
    metadata:
      labels:
        app: autosre
        component: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $svc.port }}"
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.global.image.repository }}/api-gateway:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http
            - containerPort: 8081
              name: ws
          env:
            - name: AUTOSRE_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.config.autosre.kafka.bootstrap_servers }}
            - name: AUTOSRE_DB_HOST
              value: {{ .Values.config.autosre.db.host }}
            - name: AUTOSRE_DB_PORT
              value: {{ .Values.config.autosre.db.port | quote }}
            - name: AUTOSRE_DB_NAME
              value: {{ .Values.config.autosre.db.name }}
            - name: AUTOSRE_DB_USER
              value: {{ .Values.config.autosre.db.username }}
          resources:
            requests:
              cpu: {{ $svc.resources.requests.cpu | default "100m" }}
              memory: {{ $svc.resources.requests.memory | default "256Mi" }}
            limits:
              cpu: {{ $svc.resources.limits.cpu | default "500m" }}
              memory: {{ $svc.resources.limits.memory | default "512Mi" }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: {{ .Values.global.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.global.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: {{ .Values.global.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.global.readinessProbe.periodSeconds }}
---
apiVersion: v1
kind: Service
metadata:
  name: autosre-api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: autosre
    component: api-gateway
spec:
  type: ClusterIP
  ports:
    - port: {{ $svc.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 8081
      targetPort: ws
      protocol: TCP
      name: ws
  selector:
    app: autosre
    component: api-gateway
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autosre-api-gateway-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.hosts[0].host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autosre-api-gateway
                port:
                  number: {{ $svc.port }}
{{- end }}