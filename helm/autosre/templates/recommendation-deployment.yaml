{{- /*
Template for Recommendation Service Deployment
*/ -}}
{{- $svc := .Values.services.recommendation -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autosre-recommendation
  namespace: {{ .Release.Namespace }}
  labels:
    app: autosre
    component: recommendation
    version: {{ .Chart.Version }}
spec:
  replicas: {{ $svc.replicaCount | default 2 }}
  selector:
    matchLabels:
      app: autosre
      component: recommendation
  template:
    metadata:
      labels:
        app: autosre
        component: recommendation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $svc.port }}"
    spec:
      containers:
        - name: recommendation
          image: "{{ .Values.global.image.repository }}/recommendation:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http
          env:
            - name: AUTOSRE_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.config.autosre.kafka.bootstrap_servers }}
            - name: AUTOSRE_REDIS_HOST
              value: {{ .Values.config.autosre.redis.host }}
            - name: AUTOSRE_REDIS_PORT
              value: {{ .Values.config.autosre.redis.port | quote }}
          resources:
            requests:
              cpu: {{ $svc.resources.requests.cpu | default "100m" }}
              memory: {{ $svc.resources.requests.memory | default "256Mi" }}
            limits:
              cpu: {{ $svc.resources.limits.cpu | default "500m" }}
              memory: {{ $svc.resources.limits.memory | default "512Mi" }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: {{ .Values.global.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.global.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: {{ .Values.global.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.global.readinessProbe.periodSeconds }}
---
apiVersion: v1
kind: Service
metadata:
  name: autosre-recommendation
  namespace: {{ .Release.Namespace }}
  labels:
    app: autosre
    component: recommendation
spec:
  type: ClusterIP
  ports:
    - port: {{ $svc.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: autosre
    component: recommendation