server:
  port: 8080

spring:
  application:
    name: api-gateway-service

  datasource:
    url: jdbc:postgresql://${AUTOSRE_DB_HOST:localhost}:${AUTOSRE_DB_PORT:5432}/${AUTOSRE_DB_NAME:autosre}
    username: ${AUTOSRE_DB_USER:postgres}
    password: ${AUTOSRE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

autosre:
  kafka:
    bootstrap-servers: ${AUTOSRE_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topics:
      anomalies: autosre.alerts.anomalies
      remediation: autosre.actions.remediation

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.autosre: INFO
    org.springframework.web: INFO