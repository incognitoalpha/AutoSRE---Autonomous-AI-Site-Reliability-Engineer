spring:
  application:
    name: ai-agent-service

  datasource:
    url: jdbc:postgresql://localhost:5432/autosre
    username: autosre
    password: ${POSTGRES_PASSWORD:autosre}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

# LangChain4j configuration
langchain4j:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-20250514
    max-tokens: 4096
    temperature: 0.1

autosre:
  kafka:
    topics:
      anomalies: autosre.alerts.anomalies
    consumer-groups:
      agent-service: agent-service-group

# Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true